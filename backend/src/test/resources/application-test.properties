# Configuração para testes - usa PostgreSQL real
# Usa variáveis de ambiente do sistema ou do arquivo .env
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:grivy_test}?sslmode=${DB_SSL_MODE:disable}
spring.datasource.username=${DB_USERNAME:grivy}
spring.datasource.password=${DB_PASSWORD:grivy}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration para testes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=UUID

# Flyway Configuration para testes
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.ignore-missing-migrations=true
spring.flyway.out-of-order=true

# Testes unitários AuthService: sem sleep artificial no reset de senha
app.security.password-reset-min-duration-ms=0

# JWT: deve ser Base64 válido com >= 32 bytes decodificados
jwt.secret=MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Ng==
jwt.expiration-days=1

# CORS para testes de preflight
app.cors.allowed-origins=https://grivy.netlify.app,http://localhost:3000

# Scheduling desabilitado em testes
spring.task.scheduling.pool.size=1
