spring.application.name=backend

# Porta (Railway injeta PORT dinâmica)
server.port=${PORT:8080}

# Database Configuration (using environment variables)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-missing-migrations=true
spring.flyway.out-of-order=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-days=14

# Mail (recuperação de senha - Brevo)
brevo.api-key=${BREVO_API_KEY:}
app.mail.from=${MAIL_FROM:grivycontrolefinanceiro@gmail.com}

# Mercado Pago (assinaturas)
mp.access-token=${MP_ACCESS_TOKEN:}
mp.public-key=${MP_PUBLIC_KEY:}
mp.webhook-secret=${MP_WEBHOOK_SECRET:}

# URL base do backend para webhooks (ex: https://api.grivy.com)
app.webhook.base-url=${APP_WEBHOOK_BASE_URL:}

# URL do frontend (redirect após Open Finance)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# Pluggy Open Finance
pluggy.client-id=${PLUGGY_CLIENT_ID:}
pluggy.client-secret=${PLUGGY_CLIENT_SECRET:}

# Origens permitidas (CORS + validação Origin para mitigação CSRF)
app.cors.allowed-origins=${APP_CORS_ORIGINS:https://grivy.netlify.app,https://www.grivy.netlify.app,http://localhost:3000,http://localhost:5173}

# Proxies confiáveis (CIDR) — X-Forwarded-For só é confiável quando remoteAddr está na lista
app.trusted-proxies=${APP_TRUSTED_PROXIES:}

# Actuator (health/readiness para diagnóstico)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# SpringDoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
